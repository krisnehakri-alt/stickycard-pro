# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "c01f7c8d9677dae95a5345105de63275"
application_url = "https://stickycard-pro.sabaiinnovations.com"
embedded = true
name = "stickycard pro"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "write_products,write_metaobjects,write_metaobject_definitions"

[product.metafields.app.demo_info]
type = "single_line_text_field"
name = "Demo Source Info"
description = "Tracks products created by the Shopify app template for development"

  [product.metafields.app.demo_info.access]
  admin = "merchant_read_write"

[metaobjects.app.example]
name = "Example"
description = "An example metaobject definition created by this template"

  [metaobjects.app.example.access]
  admin = "merchant_read_write"

[metaobjects.app.example.fields.title]
name = "Title"
type = "single_line_text_field"
required = true

[metaobjects.app.example.fields.description]
name = "Description"
type = "multi_line_text_field"

[webhooks]
api_version = "2026-07"

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/uninstalled"
  topics = [ "app/uninstalled" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/scopes_update"
  topics = [ "app/scopes_update" ]

  [webhooks.privacy_compliance]
  customer_deletion_url = "/webhooks/customers/redact"
  customer_data_request_url = "/webhooks/customers/data_request"
  shop_deletion_url = "/webhooks/shop/redact"

[auth]
redirect_urls = [
  "https://stickycard-pro.sabaiinnovations.com/auth/callback",
  "https://stickycard-pro.sabaiinnovations.com/auth/shopify/callback",
  "https://stickycard-pro.sabaiinnovations.com/api/auth/callback"
]

[build]
automatically_update_urls_on_dev = false

[app_proxy]
url = "https://stickycard-pro.sabaiinnovations.com/api/storefront"
subpath = "stickycards"
prefix = "apps"
